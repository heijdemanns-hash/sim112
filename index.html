// ─── SPEECH ────────────────────────────────
function useSpeech(modeId) {
  const vRef = useRef(null);
  const [voiceName, setVoiceName] = useState('');
  useEffect(() => {
    const pick = () => {
      const all = window.speechSynthesis?.getVoices() || [];
      if (!all.length) return;
      const score = v => {
        let s = 0;
        if (v.lang === 'nl-NL') s += 10; else if (v.lang.startsWith('nl')) s += 5;
        const n = v.name.toLowerCase();
        if (n.includes('xander')) s += 40;
        if (n.includes('saskia')) s += 38;
        if (n.includes('wavenet')) s += 25;
        if (n.includes('neural')||n.includes('enhanced')||n.includes('premium')) s += 20;
        if (n.includes('google nl')||n.includes('google nederlands')) s += 18;
        if (n.includes('google')) s += 8;
        return s;
      };
      const nl = all.filter(v => v.lang.startsWith('nl'));
      const pool = nl.length ? nl : all;
      const best = pool.sort((a,b) => score(b)-score(a))[0];
      vRef.current = best;
      setVoiceName(best?.name || '');
    };
    pick();
    window.speechSynthesis.onvoiceschanged = pick;
  }, []);

  const speak = useCallback((text, type='max', cb) => {
    if (!text || !window.speechSynthesis) return;
    const clean = text.replace(/\[KLAAR\]/g,'').replace(/\*[^*]+\*/g,'').replace(/112/g,'één één twee').trim();
    window.speechSynthesis.cancel();
    setTimeout(() => {
      const u = new SpeechSynthesisUtterance(clean);
      u.lang = 'nl-NL';
      if (vRef.current) u.voice = vRef.current;
      if (type==='operator') { u.rate=modeId==='young'?0.74:modeId==='senior'?0.87:0.80; u.pitch=modeId==='young'?1.20:0.78; }
      else if (type==='max') { u.rate=modeId==='young'?0.72:0.86; u.pitch=modeId==='young'?1.30:1.08; }
      else { u.rate=0.83; u.pitch=1.0; }
      u.volume=1;
      if (cb) u.onend=cb;
      window.speechSynthesis.speak(u);
    }, 120);
  }, [modeId]);

  const stop = useCallback(() => window.speechSynthesis?.cancel(), []);
  return { speak, stop, voiceName };
}

function App() {
  const [scr, setScr] = useState("disclaimer");
  const [confirmed, setConfirmed] = useState(false);
  const [mode, setMode] = useState(null);
  const [muted, setMuted] = useState(false);
  const [svc, setSvc] = useState("brandweer");
  const [scenIdx, setScenIdx] = useState(0);
  const [cardIdx, setCardIdx] = useState(0);
  const [qi, setQi] = useState(0);
  const [qSel, setQSel] = useState(null);
  const [qScore, setQScore] = useState(0);
  const [p2step, setP2step] = useState(0);
  const [p2sel, setP2sel] = useState(null);
  const [p2score, setP2score] = useState(0);
  const [p2done, setP2done] = useState(false);
  const [p2retry, setP2retry] = useState(false);
  const [p2stepFailed, setP2stepFailed] = useState(false);
  const [p3confirmed, setP3confirmed] = useState(false);
  const [p3msgs, setP3msgs] = useState([]);
  const [p3inp, setP3inp] = useState("");
  const [p3busy, setP3busy] = useState(false);
  const [p3end, setP3end] = useState(false);
  const [progress, setProgress] = useState({});
  const [unlocks, setUnlocks] = useState({p2:{brandweer:false,ambulance:false,politie:false},p3:{brandweer:false,ambulance:false,politie:false}});
  const msgsRef = useRef(null);
  const { speak: rawSpeak, stop, voiceName } = useSpeech(mode||'mid');

  const speak = useCallback((text, type, cb) => {
    if (muted) { if(cb) setTimeout(cb,0); return; }
    rawSpeak(text, type, cb);
  }, [muted, rawSpeak]);

  useEffect(() => {
    (async () => {
      try {
        const r1 = await window.storage?.get("112sim_prog"); if(r1) setProgress(JSON.parse(r1.value));
        const r2 = await window.storage?.get("112sim_unl");  if(r2) setUnlocks(JSON.parse(r2.value));
        const r3 = await window.storage?.get("112sim_mode"); if(r3) setMode(r3.value);
      } catch{}
    })();
  }, []);

  const saveProg = async (p,u,m) => {
    try {
      if(p) await window.storage?.set("112sim_prog", JSON.stringify(p));
      if(u) await window.storage?.set("112sim_unl", JSON.stringify(u));
      if(m) await window.storage?.set("112sim_mode", m);
    } catch{}
  };

  useEffect(() => { if(msgsRef.current) msgsRef.current.scrollTop = msgsRef.current.scrollHeight; }, [p3msgs]);

  useEffect(() => {
    if (scr==='p1learn' && mode) {
      const sc = SCENARIOS[svc][scenIdx];
      const t = setTimeout(() => speak(sc.cards[cardIdx].h+'. '+sc.cards[cardIdx].t,'max'), 500);
      return () => clearTimeout(t);
    }
  }, [scr, cardIdx, scenIdx, svc, mode]);

  useEffect(() => {
    if (scr==='p1quiz' && mode) {
      const q = SCENARIOS[svc][scenIdx].quiz[qi];
      const t = setTimeout(() => speak(q.q,'max'), 500);
      return () => clearTimeout(t);
    }
  }, [scr, qi, scenIdx, svc, mode]);

  useEffect(() => {
    if (scr==='p2sim' && !p2done && mode) {
      const script = mode==='young' ? P2.young[svc] : P2.standard[svc];
      const step = script.steps[p2step];
      const t = setTimeout(() => speak(step.txt,'operator'), step.pre?1400:400);
      return () => clearTimeout(t);
    }
  }, [scr, p2step, p2done, svc, mode]);

  useEffect(() => {
    if (p3msgs.length > 0) {
      const last = p3msgs[p3msgs.length-1];
      if (last.r==='assistant') {
        const t = setTimeout(() => speak(last.t,'operator'), 200);
        return () => clearTimeout(t);
      }
    }
  }, [p3msgs]);

              if(i===step.ans){bg="#dcfce7";col="#166534";bord="2px solid #22c55e";}
              else if(i===p2sel){bg="#fee2e2";col="#dc2626";bord="2px solid #dc2626";}
              else{col="#d1d5db";}
            }
            return React.createElement('button', {key:i, onClick:()=>handleP2(i), style:{display:"block",width:"100%",marginBottom:10,padding:mode==='young'?"16px 14px":"12px 14px",borderRadius:12,border:bord,background:bg,color:col,fontSize:M.fs,fontWeight:600,cursor:(p2sel!==null||p2retry)?"default":"pointer",textAlign:"left",transition:"all .25s"}}, o);
          }),
          p2sel!==null&&!p2retry&&p2sel===step.ans && React.createElement('div', {style:{background:"#dcfce7",borderRadius:10,padding:"12px",fontSize:13,color:"#166534",fontWeight:600}}, `✅ ${step.ok}`)
        ),
        p2done && React.createElement('div', null,
          React.createElement('div', {style:{background:"#1e293b",color:"#fff",borderRadius:14,padding:"16px",textAlign:"center",marginBottom:12}},
            React.createElement('div', {style:{fontSize:13,fontWeight:700,color:"#fbbf24",marginBottom:6}}, "📞 CENTRALIST"),
            React.createElement('div', {style:{fontSize:M.fs+1,fontWeight:700}}, script.closing)
          ),
          React.createElement('div', {style:{background:"#eff6ff",border:"2px solid #93c5fd",borderRadius:12,padding:"14px",marginBottom:12}},
            React.createElement('div', {style:{fontSize:13,fontWeight:800,color:"#1d4ed8",marginBottom:6}}, "ℹ️ Wist je dat?"),
            React.createElement('p', {style:{margin:0,fontSize:13,color:"#1e40af",lineHeight:1.6}}, script.info)
          ),
          React.createElement('div', {style:{textAlign:"center",marginBottom:12}},
            React.createElement('div', {style:{fontSize:48}}, p2score>=(mode==='young'?2:4)?"🎉":"💪"),
            React.createElement('p', {style:{fontSize:16,fontWeight:700,color:"#0f172a"}}, "Score: ", React.createElement('span', {style:{color:p2score>=(mode==='young'?2:4)?V.color:"#dc2626"}}, `${p2score}/${script.steps.length}`)),
            p2score>=(mode==='young'?2:4) && React.createElement('p', {style:{fontSize:13,color:"#16a34a",fontWeight:700}}, "✅ Fase 3 is nu ontgrendeld!")
          ),
          React.createElement(Btn, {color:V.color,label:"Opnieuw proberen 🔄",onClick:()=>go("p2sim",{svc})}),
          React.createElement(Btn, {color:"#64748b",label:"Terug naar overzicht",onClick:()=>go("service",{svc})})
        )
      )
    );
  }

  // FASE 3 BEVESTIGING
  if (scr==="p3confirm") return React.createElement('div', {style:W},
    React.createElement(LB),
    React.createElement('div', {style:{...PAD,textAlign:"center",paddingTop:40}},
      React.createElement('div', {style:{fontSize:56}}, "🎙️"),
      React.createElement('h2', {style:{fontSize:22,fontWeight:900,margin:"12px 0 8px",color:"#0f172a"}}, "Fase 3 — AI Simulatie"),
      React.createElement('div', {style:{background:"#dc2626",color:"#fff",borderRadius:12,padding:"14px",marginBottom:16,fontWeight:700,fontSize:14}}, "⚠️ Dit is een oefening — geen echt gesprek met 112"),
      React.createElement(Card, {style:{textAlign:"left"}},
        React.createElement('p', {style:{margin:"0 0 8px",fontSize:14,color:"#374151",lineHeight:1.6}}, "In Fase 3 voer je een zo realistisch mogelijk gesprek met een AI-centralist. Het gesprek eindigt zodra de centralist alle informatie heeft."),
        React.createElement('p', {style:{margin:0,fontSize:13,color:"#6b7280",lineHeight:1.6}}, "De centralist geeft op geen enkel moment instructies over wat je moet doen.")
      ),
      React.createElement('div', {onClick:()=>setP3confirmed(c=>!c), style:{background:p3confirmed?"#f0fdf4":"#f8fafc",border:`2px solid ${p3confirmed?"#22c55e":"#d1d5db"}`,borderRadius:12,padding:"14px 16px",marginBottom:16,cursor:"pointer",display:"flex",alignItems:"center",gap:12}},
        React.createElement('div', {style:{width:24,height:24,borderRadius:6,border:`2.5px solid ${p3confirmed?"#22c55e":"#9ca3af"}`,background:p3confirmed?"#22c55e":"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},
          p3confirmed && React.createElement('span', {style:{color:"#fff",fontSize:15,fontWeight:900}}, "✓")
        ),
        React.createElement('p', {style:{margin:0,fontSize:14,color:p3confirmed?"#166534":"#374151",fontWeight:600}}, "Ik begrijp dat dit een oefening is en geen echt gesprek met 112")
      ),
      React.createElement(Btn, {color:p3confirmed?V.color:"#9ca3af",label:"Start simulatie →",onClick:()=>p3confirmed&&go("p3sim",{svc}),disabled:!p3confirmed}),
      React.createElement(Btn, {color:"#64748b",label:"Terug",onClick:()=>go("service",{svc})})
    )
  );

  // FASE 3 AI
  if (scr==="p3sim") {
    const scenario = svc==='brandweer'?'brand in een woonhuis':svc==='ambulance'?'iemand die bewusteloos op de grond ligt':'een vechtpartij op straat';
    const sysPrompt = M.p3sys + ` Scenario: ${scenario}.`;

    const sendMsg = async () => {
      const msg = p3inp.trim();
      if (!msg||p3busy||p3end) return;
      const newMsgs = [...p3msgs,{r:"user",t:msg}];
      setP3msgs(newMsgs); setP3inp(""); setP3busy(true);
      try {
        const res = await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
            model:"claude-sonnet-4-20250514",
            max_tokens:200,
            system:sysPrompt,
            messages:newMsgs.map(m=>({role:m.r==="user"?"user":"assistant",content:m.t})),
          })
        });
        const data = await res.json();
        const raw = data.content?.[0]?.text||"...";
        const done = raw.includes("[KLAAR]");
        const clean = raw.replace("[KLAAR]","").trim();
        setP3msgs([...newMsgs,{r:"assistant",t:clean}]);
        if (done) setP3end(true);
      } catch { setP3msgs(m=>[...m,{r:"assistant",t:"[Verbinding verbroken. Probeer opnieuw.]"}]); }
      setP3busy(false);
    };

    return React.createElement('div', {style:{...W,display:"flex",flexDirection:"column",height:"100vh"}},
      React.createElement(LB),
      React.createElement('div', {style:{padding:"12px 16px",background:M.light,borderBottom:`2px solid ${M.primary}`,flexShrink:0}},
        React.createElement('button', {onClick:()=>go("service",{svc}), style:{background:"none",border:"none",fontSize:13,color:M.primary,cursor:"pointer",padding:0,fontWeight:700}}, "← Terug"),
        React.createElement('div', {style:{textAlign:"center",fontSize:14,fontWeight:800,color:M.primary}}, `📞 FASE 3 — AI SIMULATIE: ${V.name.toUpperCase()}`),
        React.createElement('div', {style:{textAlign:"center",fontSize:11,color:"#9ca3af",marginTop:2}}, "⚠️ Simulator — Geen echte hulpdienst")
      ),
      React.createElement('div', {ref:msgsRef, style:{flex:1,overflowY:"auto",padding:"16px",background:"#f8fafc"}},
        p3msgs.length===0 && React.createElement('div', {style:{textAlign:"center",color:"#9ca3af",fontSize:14,padding:"40px 0"}},
          React.createElement('div', {style:{fontSize:40,marginBottom:8}}, "📱"),
          mode==='young'?"Zeg 'Hallo' om te beginnen!":"Typ iets om het gesprek te starten.",
          React.createElement('br'),
          React.createElement('span', {style:{fontSize:12,color:"#cbd5e1"}}, "Bijv: \"Hallo, ik moet bellen\"")
        ),
        ...p3msgs.map((m,i) =>
          React.createElement('div', {key:i, style:{display:"flex",justifyContent:m.r==="user"?"flex-end":"flex-start",marginBottom:10}},
            React.createElement('div', {style:{background:m.r==="user"?M.primary:"#fff",color:m.r==="user"?"#fff":"#1e293b",borderRadius:m.r==="user"?"16px 16px 2px 16px":"16px 16px 16px 2px",padding:"11px 15px",fontSize:M.fs,maxWidth:"82%",boxShadow:m.r==="assistant"?"0 1px 4px rgba(0,0,0,.08)":"none",border:m.r==="assistant"?"1px solid #e5e7eb":"none",lineHeight:1.55}},
              m.r==="assistant" && React.createElement('div', {style:{fontSize:11,fontWeight:800,color:M.primary,marginBottom:4}}, "📞 CENTRALIST"),
              m.t,
              m.r==="assistant" && !muted && React.createElement('button', {onClick:()=>speak(m.t,'operator'), style:{background:"none",border:"none",fontSize:12,cursor:"pointer",color:"#9ca3af",padding:"0 0 0 8px"}}, "🔊")
            )
          )
        ),
        p3busy && React.createElement('div', {style:{display:"flex",gap:4,padding:"10px 14px",background:"#fff",borderRadius:16,width:"fit-content",border:"1px solid #e5e7eb"}},
          ...[0,1,2].map(i => React.createElement('div', {key:i, style:{width:8,height:8,borderRadius:"50%",background:M.primary,animation:"bounce .8s infinite",animationDelay:`${i*.2}s`}}))
        ),
        p3end && React.createElement('div', {style:{background:"#f0fdf4",border:"2px solid #22c55e",borderRadius:14,padding:"14px",margin:"12px 0",textAlign:"center"}},
          React.createElement('div', {style:{fontSize:28,marginBottom:4}}, "✅"),
          React.createElement('p', {style:{margin:"0 0 4px",fontWeight:800,color:"#166534",fontSize:M.fs}}, "Gesprek afgerond!"),
          React.createElement('p', {style:{margin:0,fontSize:13,color:"#15803d"}}, `De ${V.name} is onderweg.`)
        )
      ),
      !p3end && React.createElement('div', {style:{padding:"12px 16px",borderTop:"1px solid #e5e7eb",background:"#fff",display:"flex",gap:8,flexShrink:0}},
        React.createElement('input', {value:p3inp, onChange:e=>setP3inp(e.target.value), onKeyDown:e=>e.key==="Enter"&&sendMsg(), placeholder:"Typ jouw antwoord...", style:{flex:1,border:"2px solid #e5e7eb",borderRadius:12,padding:"12px 14px",fontSize:M.fs,outline:"none",color:"#0f172a"}}),
        React.createElement('button', {onClick:sendMsg, disabled:p3busy, style:{background:p3busy?"#d1d5db":M.primary,color:"#fff",border:"none",borderRadius:12,padding:"12px 18px",fontSize:18,cursor:p3busy?"default":"pointer",fontWeight:700}}, "➤")
      ),
      p3end && React.createElement('div', {style:{padding:"12px 16px",borderTop:"1px solid #e5e7eb",background:"#fff",flexShrink:0}},
        React.createElement(Btn, {color:M.primary,label:"Opnieuw proberen 🔄",onClick:()=>go("p3sim",{svc}),style:{marginBottom:6}}),
        React.createElement(Btn, {color:"#64748b",label:"Terug naar overzicht",onClick:()=>go("service",{svc}),style:{marginBottom:0}})
      ),
      React.createElement('style', null, "@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}")
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
